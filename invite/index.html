<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Playdate circle invite</title>
  <meta name="robots" content="noindex" />
  <style>
    :root { --primary: #1A73E8; --on-surface: #1F1F1F; --variant: #444746; --outline: #747775; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: var(--on-surface); min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: #F8F9FA; padding: 24px; text-align: center;
    }
    .card { background: #fff; border-radius: 20px; border: 1px solid #E1E3E1; padding: 40px 32px; max-width: 420px; width: 100%; }
    .logo-mark { width: 56px; height: 56px; border-radius: 16px; background: var(--primary); color: #fff;
      font-size: 28px; font-weight: 700; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 20px; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    p { font-size: 15px; color: var(--variant); margin-bottom: 8px; line-height: 1.6; }
    .btn { display: inline-block; margin-top: 20px; padding: 14px 32px; border-radius: 999px;
      background: var(--primary); color: #fff; font-size: 16px; font-weight: 500; text-decoration: none; }
    .hint { margin-top: 22px; font-size: 13px; color: var(--outline); line-height: 1.6; }
    .err { color: #B3261E; }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="card">
    <div class="logo-mark">P</div>
    <h1>You've been invited to a circle</h1>
    <p id="msg">A friend added you to one of their circles on Playdate.</p>
    <a id="open" class="btn" href="#">Open in Playdate</a>
    <p class="hint">
      Don't have the app yet? Playdate is in early access — ask the friend who
      sent this for an install link, then tap the button above again.
    </p>
  </div>
  <script>
    (function () {
      var params = new URLSearchParams(location.search);
      var token = params.get('token');
      var btn = document.getElementById('open');
      if (!token) {
        document.getElementById('msg').innerHTML =
          '<span class="err">This invite link is missing its token — ask your friend to send it again.</span>';
        btn.style.display = 'none';
        return;
      }
      var deepLink = 'playdate://invite?token=' + encodeURIComponent(token);
      btn.href = deepLink;
      setTimeout(function () { location.href = deepLink; }, 400);
    })();
  </script>
</body>
</html>
